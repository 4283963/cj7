spring.application.name=matrix-scheduler
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/lab_matrix_scheduler?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC

scheduler.heartbeat.timeout=30000
scheduler.loadbalancer.strategy=least_loaded
scheduler.task.poll-interval=5000
